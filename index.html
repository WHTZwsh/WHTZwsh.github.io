<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>MinecraftBE服务器 | 樱花粉主题</title>
  <!-- 引入 Material Design 3 (MG3) 风格的字体和图标 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <!-- 引入外部CSS文件 -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- 标题与主题切换 -->
    <div class="title-section">
      <h1>🌸 MinecraftBE 服务器</h1>
      <div class="theme-switcher">
        <button class="theme-btn active" data-theme="sakura">
          <span class="material-icons-outlined">favorite</span> 樱花粉
        </button>
        <button class="theme-btn" data-theme="ocean">
          <span class="material-icons-outlined">water_drop</span> 海洋
        </button>
        <button class="theme-btn" data-theme="forest">
          <span class="material-icons-outlined">park</span> 森林
        </button>
      </div>
    </div>

    <!-- 操作按钮组 -->
    <div class="actions-list">
      <button class="md-button" id="joinServerBtn">
        <span class="material-icons-outlined">login</span>
        加入服务器
      </button>

      <button class="md-button secondary" id="feedbackBtn">
        <span class="material-icons-outlined">feedback</span>
        问题反馈
      </button>

      <button class="md-button secondary" id="sponsorBtn">
        <span class="material-icons-outlined">volunteer_activism</span>
        赞助
      </button>
    </div>

    <!-- 已复制提示 (默认隐藏) -->
    <div class="toast-message" id="copyToast">
      <span class="material-icons-outlined">check_circle</span>
      已复制
    </div>

    <!-- 感谢与底部信息 -->
    <div class="thanks-section">
      <p>
        <span class="material-icons-outlined">ecosystem</span>
        感谢简幻欢提供公益服务器
      </p>
      <div class="heart-footer">
        <span class="material-icons-outlined">favorite</span> Py WHTZ
      </div>
    </div>
  </div>

  <!-- 引入外部JavaScript文件 -->
  <script src="script.js"></script>
</body>
                            </html>
